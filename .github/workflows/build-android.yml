name: build-android

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Android AAR (arm64-v8a)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: install ninja
        run: sudo apt-get update && sudo apt-get install -y ninja-build

      - name: setup Android NDK
        id: setup-ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r27c
          add-to-path: false

      - name: build AAR
        run: tool/build_android_aar.sh --ndk "${{ steps.setup-ndk.outputs.ndk-path }}" --abi arm64-v8a --clean

      - name: stage and checksum
        run: |
          cp build/android/llama-cpp-dart.aar .
          shasum -a 256 llama-cpp-dart.aar > llama-cpp-dart.aar.sha256

      - name: upload AAR
        uses: actions/upload-artifact@v4
        with:
          name: llama-cpp-dart-aar
          path: |
            llama-cpp-dart.aar
            llama-cpp-dart.aar.sha256

      # ----- attach to GitHub Release on tag push -----
      - name: attach to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            llama-cpp-dart.aar
            llama-cpp-dart.aar.sha256
          fail_on_unmatched_files: true
